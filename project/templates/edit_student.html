{% extends "base.html" %}

{% block content %}
<h1 style="font-size: 28px; margin-bottom: 24px;">✏️ 编辑学生</h1>

<div class="card" style="max-width: 500px;">
    <form method="POST">
        <div class="form-group">
            <label>姓名 *</label>
            <input type="text" name="name" value="{{ student.name }}" required>
        </div>
        <div class="form-group">
            <label>学号 *</label>
            <input type="text" name="student_id" value="{{ student.student_id }}" required>
        </div>
        <div class="form-group">
            <label>班级 *</label>
            <select name="class_id" required>
                {% for cls in classes %}
                <option value="{{ cls.id }}" {% if cls.id == student.class_id %}selected{% endif %}>{{ cls.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div style="display: flex; gap: 12px;">
            <button type="submit" class="btn btn-primary">保存</button>
            <a href="/students" class="btn btn-secondary">取消</a>
        </div>
    </form>
</div>
{% endblock %}
