<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>二维码签到</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .logo {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .title {
            font-size: 24px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #8892b0;
            font-size: 16px;
            margin-bottom: 30px;
        }

        .course-info {
            background: rgba(0, 212, 255, 0.1);
            border-left: 4px solid #00d4ff;
            padding: 15px;
            border-radius: 0 8px 8px 0;
            margin-bottom: 30px;
            text-align: left;
        }

        .course-info .label {
            color: #8892b0;
            font-size: 13px;
            margin-bottom: 5px;
        }

        .course-info .value {
            color: #00d4ff;
            font-size: 18px;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            text-align: left;
            color: #8892b0;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            border-color: #00d4ff;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
        }

        .form-group input::placeholder {
            color: #5a6070;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #00d4ff, #00ff88);
            border: none;
            border-radius: 12px;
            color: #1a1a2e;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.3);
        }

        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .success-message {
            display: none;
            margin-top: 20px;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }

        .success-message.success {
            display: block;
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid rgba(0, 255, 136, 0.3);
        }

        .success-message.error {
            display: block;
            background: rgba(255, 99, 71, 0.1);
            border: 1px solid rgba(255, 99, 71, 0.3);
        }

        .success-message .icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .success-message.success .icon {
            color: #00ff88;
        }

        .success-message.error .icon {
            color: #ff6347;
        }

        .success-message .text {
            font-size: 16px;
            font-weight: 600;
        }

        .success-message.success .text {
            color: #00ff88;
        }

        .success-message.error .text {
            color: #ff6347;
        }

        .footer {
            margin-top: 30px;
            color: #5a6070;
            font-size: 13px;
        }

        .countdown {
            display: inline-block;
            background: rgba(255, 193, 7, 0.1);
            color: #ffc107;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 13px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">📱</div>
        <div class="title">二维码签到</div>
        <div class="subtitle">请输入学号完成签到</div>

        <div class="course-info">
            <div class="label">课程名称</div>
            <div class="value">{{ course.name }}</div>
        </div>

        <form id="signinForm">
            <div class="form-group">
                <label for="studentId">学号</label>
                <input type="text" id="studentId" placeholder="请输入学号" autocomplete="off" required>
            </div>
            <button type="submit" class="submit-btn" id="submitBtn">确认签到</button>
        </form>

        <div class="countdown" id="countdown">⏱️ 二维码有效期剩余: 30秒</div>

        <div class="success-message" id="successMessage">
            <div class="icon">✅</div>
            <div class="text">签到成功</div>
        </div>

        <div class="footer">
            明眸智签 - 人脸识别考勤系统
        </div>
    </div>

    <script>
        const token = '{{ token }}';
        let countdown = 30;
        
        function updateCountdown() {
            countdown--;
            document.getElementById('countdown').textContent = `⏱️ 二维码有效期剩余: ${countdown}秒`;
            
            if (countdown <= 0) {
                alert('二维码已过期，请重新扫描');
                window.location.reload();
            }
        }
        
        const countdownInterval = setInterval(updateCountdown, 1000);
        
        document.getElementById('signinForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const studentId = document.getElementById('studentId').value.trim();
            const submitBtn = document.getElementById('submitBtn');
            const successMessage = document.getElementById('successMessage');
            
            if (!studentId) {
                return;
            }
            
            submitBtn.disabled = true;
            submitBtn.textContent = '签到中...';
            
            try {
                const response = await fetch('/api/qr_checkin', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        token: token,
                        student_id: studentId
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    successMessage.className = 'success-message success';
                    successMessage.querySelector('.icon').textContent = '✅';
                    successMessage.querySelector('.text').textContent = result.message;
                    document.getElementById('signinForm').style.display = 'none';
                    document.getElementById('countdown').style.display = 'none';
                } else {
                    successMessage.className = 'success-message error';
                    successMessage.querySelector('.icon').textContent = '❌';
                    successMessage.querySelector('.text').textContent = result.message;
                }
                
                submitBtn.disabled = false;
                submitBtn.textContent = '确认签到';
                
            } catch (error) {
                successMessage.className = 'success-message error';
                successMessage.querySelector('.icon').textContent = '❌';
                successMessage.querySelector('.text').textContent = '网络错误，请重试';
                submitBtn.disabled = false;
                submitBtn.textContent = '确认签到';
            }
        });
    </script>
</body>
</html>
