{% extends "base.html" %}

{% block content %}
<h1 style="font-size: 28px; margin-bottom: 24px;">✏️ 添加学生</h1>

<div class="card" style="max-width: 500px;">
    {% if error %}
    <div style="background: rgba(245, 87, 108, 0.15); border: 1px solid rgba(245, 87, 108, 0.3); border-radius: 12px; padding: 14px 16px; margin-bottom: 20px; color: #f5576c; font-size: 14px;">⚠️ {{ error }}</div>
    {% endif %}
    <form method="POST">
        <div class="form-group">
            <label>姓名 *</label>
            <input type="text" name="name" required>
        </div>
        <div class="form-group">
            <label>学号 *</label>
            <input type="text" name="student_id" required>
        </div>
        <div class="form-group">
            <label>班级 *</label>
            <select name="class_id" required>
                <option value="">请选择班级</option>
                {% for cls in classes %}
                <option value="{{ cls.id }}">{{ cls.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div style="display: flex; gap: 12px;">
            <button type="submit" class="btn btn-primary">保存</button>
            <a href="/students" class="btn btn-secondary">取消</a>
        </div>
    </form>
</div>
{% endblock %}
