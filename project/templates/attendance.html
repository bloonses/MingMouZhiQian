{% extends "base.html" %}

{% block content %}
<style>
    .attendance-layout {
        display: grid;
        grid-template-columns: 1fr 320px;
        gap: 16px;
    }
    .camera-section {
        display: flex;
        flex-direction: column;
        gap: 12px;
    }
    .camera-controls {
        display: flex;
        gap: 10px;
        align-items: center;
    }
    .camera-controls select {
        flex: 1;
    }
    .camera-controls .btn {
        flex-shrink: 0;
    }
    .camera-controls .status-text {
        font-size: 13px;
        font-weight: 500;
        color: var(--text-muted);
        font-family: 'JetBrains Mono', monospace;
        white-space: nowrap;
        flex-shrink: 0;
    }

    .camera-frame {
        position: relative;
        background: var(--bg-deep);
        border: 1px solid var(--border);
        overflow: hidden;
        transition: border-color 0.3s, box-shadow 0.3s;
        aspect-ratio: 4 / 3;
    }
    .camera-section.recording .camera-frame {
        border-color: var(--brand);
        box-shadow: 0 0 24px var(--brand-glow);
    }
    .camera-section.flash-success .camera-frame {
        animation: cameraFlash 0.8s ease-out;
    }
    @keyframes cameraFlash {
        0% { border-color: var(--brand); box-shadow: 0 0 60px var(--brand-glow-strong), inset 0 0 40px rgba(0, 255, 136, 0.08); }
        100% { border-color: var(--border); box-shadow: none; }
    }
    .camera-frame video,
    .camera-frame canvas {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
        transform: scaleX(-1);
    }
    .camera-frame canvas {
        position: absolute;
        top: 0;
        left: 0;
        pointer-events: none;
    }
    .camera-scan-line {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 2px;
        background: linear-gradient(90deg, transparent, var(--brand), transparent);
        opacity: 0;
        transition: opacity 0.3s;
        pointer-events: none;
        z-index: 5;
    }
    .camera-section.recording .camera-scan-line {
        opacity: 0.6;
        animation: scanDown 2s linear infinite;
    }
    @keyframes scanDown {
        from { top: 0; }
        to { top: 100%; }
    }

    .camera-status {
        position: absolute;
        bottom: 12px;
        left: 12px;
        font-family: 'JetBrains Mono', monospace;
        font-size: 10px;
        color: var(--text-muted);
        transition: color 0.3s;
        z-index: 5;
    }
    .camera-section.recording .camera-status {
        color: var(--brand);
    }

    .camera-badge {
        position: absolute;
        background: rgba(0,0,0,0.85);
        color: var(--text-primary);
        padding: 8px 16px;
        font-size: 13px;
        font-weight: 500;
        display: none;
        align-items: center;
        gap: 8px;
        border: 1px solid rgba(255,255,255,0.08);
        z-index: 5;
    }
    .camera-badge.top-left { top: 16px; left: 16px; }
    .camera-badge.top-right { top: 16px; right: 16px; }
    .camera-badge.bottom-center {
        bottom: 16px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 15px;
        padding: 12px 24px;
    }

    .counter-panel {
        display: flex;
        flex-direction: column;
        gap: 12px;
    }
    .counter-card {
        background: var(--bg-surface);
        border: 1px solid var(--border);
        padding: 24px;
        text-align: center;
        position: relative;
        overflow: hidden;
    }
    .counter-card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 20%;
        right: 20%;
        height: 2px;
        background: linear-gradient(90deg, transparent, var(--brand), transparent);
        opacity: 0.4;
    }
    .counter-label {
        display: block;
        font-size: 10px;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 8px;
        font-family: 'JetBrains Mono', monospace;
    }
    .counter-value {
        font-family: 'JetBrains Mono', monospace;
        font-size: 52px;
        font-weight: 800;
        color: var(--brand);
        text-shadow: 0 0 20px var(--brand-glow);
        animation: counterPulse 2.4s ease-in-out infinite;
    }
    @keyframes counterPulse {
        0%, 100% { text-shadow: 0 0 20px var(--brand-glow); }
        50% { text-shadow: 0 0 36px var(--brand-glow-strong); }
    }

    .recent-header {
        display: block;
        font-size: 10px;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 12px;
        font-family: 'JetBrains Mono', monospace;
    }
    .recent-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 0;
        border-bottom: 1px solid rgba(255,255,255,0.03);
        font-size: 13px;
        animation: itemFadeIn 0.3s var(--ease-pulse) both;
    }
    .recent-item .name {
        color: var(--text-primary);
    }
    .recent-item .time {
        font-family: 'JetBrains Mono', monospace;
        color: var(--brand);
        font-size: 11px;
    }
    .recent-item .status-badge {
        font-family: 'JetBrains Mono', monospace;
        font-size: 9px;
        padding: 2px 6px;
    }

    @keyframes itemFadeIn {
        from { opacity: 0; transform: translateX(8px); }
        to { opacity: 1; transform: translateX(0); }
    }

    .success-overlay .check-icon {
        font-family: 'JetBrains Mono', monospace;
    }

    .empty-state {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100%;
        min-height: 200px;
        color: var(--text-muted);
    }
    .empty-state-icon {
        font-size: 64px;
        margin-bottom: 16px;
        opacity: 0.4;
    }
    .empty-state-title {
        font-size: 20px;
        font-weight: 600;
        color: var(--text-secondary);
        margin-bottom: 6px;
    }
    .empty-state-desc {
        font-size: 14px;
    }

    .debug-section {
        margin-top: 20px;
        background: var(--bg-surface);
        border: 1px solid var(--border);
        overflow: hidden;
    }
    .debug-header {
        padding: 12px 18px;
        background: var(--bg-deep);
        font-size: 13px;
        font-weight: 600;
        color: var(--brand);
        border-bottom: 1px solid var(--border);
        font-family: 'JetBrains Mono', monospace;
    }
    .debug-content {
        padding: 14px 18px;
        max-height: 220px;
        overflow-y: auto;
        font-family: 'Courier New', monospace;
        font-size: 12px;
        color: var(--text-secondary);
        line-height: 1.7;
    }

    @media (max-width: 1024px) {
        .attendance-layout {
            grid-template-columns: 1fr;
        }
        .counter-panel {
            flex-direction: row;
        }
        .counter-card {
            flex: 1;
        }
    }
    @media (max-width: 640px) {
        .counter-panel {
            flex-direction: column;
        }
        .camera-controls {
            flex-wrap: wrap;
        }
    }
</style>

<div class="page-header">
    <h1>人脸识别签到</h1>
</div>

<div class="attendance-layout">
    <div class="camera-section" id="cameraSection">
        <div class="camera-controls">
            <select id="classSelect">
                <option value="">选择班级</option>
                {% for cls in classes %}
                <option value="{{ cls.id }}">{{ cls.name }}</option>
                {% endfor %}
            </select>
            <select id="courseSelect">
                <option value="">选择课程</option>
                {% for course in courses %}
                <option value="{{ course.id }}">{{ course.name }}</option>
                {% endfor %}
            </select>
            <button id="modeToggleBtn" class="btn btn-outline">模式: 前端</button>
            <span class="status-text" id="status">请选择班级启动签到</span>
            <button id="clearBtn" class="btn btn-danger" style="display:none;">清除签到</button>
            <button id="toggleDebugBtn" class="btn btn-outline">调试</button>
        </div>
        <div class="camera-frame" id="cameraFrame">
            <div class="empty-state" id="emptyVideoState">
                <div class="empty-state-icon">&#x1F4F9;</div>
                <div class="empty-state-title">摄像头未启动</div>
                <div class="empty-state-desc">选择班级后自动开启</div>
            </div>
            <video id="video" width="640" height="480" autoplay muted playsinline></video>
            <canvas id="canvas" width="640" height="480"></canvas>
            <div class="camera-scan-line"></div>
            <span class="camera-status">CAM_01 :: STANDBY</span>
            <div class="camera-badge top-left" id="cameraStatus">
                <span class="status-dot online"></span>
                <span id="cameraStatusText">摄像头运行中</span>
            </div>
            <div class="camera-badge top-right" id="detectionInfo">
                <span id="faceCount">检测到 0 张人脸</span>
            </div>
            <div class="camera-badge bottom-center" id="nodIndicator">
                <span id="nodStatus">请点头验证</span>
            </div>
        </div>
    </div>

    <div class="counter-panel">
        <div class="counter-card">
            <span class="counter-label">TODAY_CHECKINS</span>
            <span class="counter-value" id="counter">_0</span>
        </div>
        <div class="counter-card" style="flex:1; overflow-y: auto; text-align: left;">
            <span class="recent-header">RECENT</span>
            <div class="recent-list" id="recentList">
                <div class="empty-state small" style="min-height:80px; padding:20px;">
                    <div class="empty-state-desc">暂无签到记录</div>
                </div>
            </div>
        </div>
    </div>
</div>

<div style="display:none;">
    <span id="totalCount">0</span>
    <span id="attendedCount">0</span>
    <span id="unattendedCount">0</span>
    <span id="panelCount">0/0</span>
    <div id="studentList"></div>
</div>

<div class="success-overlay" id="successOverlay">
    <div class="success-popup">
        <div class="check-icon">&check;</div>
        <h2 id="popupName"></h2>
        <p id="successTime" style="font-family:'JetBrains Mono',monospace;"></p>
    </div>
</div>

<div class="debug-section" id="debugPanel" style="display:none;">
    <div class="debug-header">诊断信息</div>
    <div class="debug-content" id="debugContent"></div>
</div>

<script src="/static/face-api.js"></script>
<script>
const MODEL_URL = '/static/models';
let stream = null;
let modelsLoaded = false;
let videoReady = false;
let faceMatcher = null;
let labeledDescriptors = [];
let currentClassId = null;
let currentCourseId = null;
let lastRecognitionTime = 0;
let lastFrameTime = 0;
let attendedStudents = new Set();
let nodState = new Map();
let isProcessing = false;
let isSwitchingClass = false;
let frameId = null;

const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
let ctx = null;

function showSuccessOverlay(name) {
    const overlay = document.getElementById('successOverlay');
    document.getElementById('popupName').textContent = name;
    overlay.classList.add('show');
    setTimeout(() => overlay.classList.remove('show'), 1000);
    
    const cam = document.getElementById('cameraSection');
    cam.classList.add('flash-success');
    setTimeout(() => cam.classList.remove('flash-success'), 800);
}

function showDebug(message, type = 'info') {
    const div = document.getElementById('debugContent');
    if (!div) return;
    const time = new Date().toLocaleTimeString();
    const color = type === 'error' ? 'var(--danger)' : type === 'success' ? 'var(--success)' : 'var(--text-muted)';
    div.innerHTML += `<div style="color:${color};margin-bottom:2px;">[${time}] ${message}</div>`;
    div.scrollTop = div.scrollHeight;
}

function toggleDebug() {
    const panel = document.getElementById('debugPanel');
    panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
}

async function loadModels() {
    if (modelsLoaded) return;
    try {
        showDebug('加载模型...');
        await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
        await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
        await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
        modelsLoaded = true;
        showDebug('模型加载完成', 'success');
    } catch (error) {
        showDebug('模型加载失败: ' + error.message, 'error');
    }
}

async function loadStudents(classId) {
    try {
        const response = await fetch(`/api/get_students/${classId}`);
        if (!response.ok) throw new Error('HTTP ' + response.status);
        const students = await response.json();

        document.getElementById('totalCount').textContent = students.length;
        const attended = students.filter(s => s.attended);
        document.getElementById('attendedCount').textContent = attended.length;
        document.getElementById('unattendedCount').textContent = students.length - attended.length;
        document.getElementById('panelCount').textContent = `${attended.length}/${students.length}`;
        document.getElementById('counter').textContent = attended.length;

        renderStudentList(students);
        // 构建前端匹配器
        labeledDescriptors = [];
        for (const s of students) {
            if (s.face_descriptor && Array.isArray(s.face_descriptor) && s.face_descriptor.length > 0) {
                try {
                    const fd = new Float32Array(s.face_descriptor);
                    const ld = new faceapi.LabeledFaceDescriptors(s.id.toString(), [fd]);
                    labeledDescriptors.push(ld);
                } catch (e) {
                    showDebug('构建人脸特征失败: ' + e.message, 'error');
                }
            }
        }
        if (labeledDescriptors.length > 0) {
            try {
                faceMatcher = new faceapi.FaceMatcher(labeledDescriptors, 0.55);
                showDebug('前端 FaceMatcher 已构建，学生特征数量: ' + labeledDescriptors.length, 'success');
            } catch (e) {
                showDebug('创建 FaceMatcher 失败: ' + e.message, 'error');
                faceMatcher = null;
            }
        } else {
            faceMatcher = null;
        }
        updateRecentList(attended);
        document.getElementById('clearBtn').style.display = attended.length > 0 ? 'inline-flex' : 'none';
        return students;
    } catch (error) {
        showDebug('加载学生失败: ' + error.message, 'error');
        return [];
    }
}

function renderStudentList(students) {
    const list = document.getElementById('studentList');
    if (students.length === 0) {
        list.innerHTML = '<div class="empty-state small"><div class="empty-state-desc">该班级暂无学生</div></div>';
        return;
    }
    list.innerHTML = students.map((s, i) => `
        <div class="student-row ${s.attended ? 'attended' : ''}" style="transition-delay:${i * 0.04}s">
            <div class="student-avatar">${s.name[0]}</div>
            <div class="student-info">
                <div class="student-name">${s.name}</div>
                <div class="student-id">${s.student_id}</div>
            </div>
            ${s.attended
                ? '<span class="student-check">&#10003;</span>'
                : `<button class="btn-manual" onclick="manualCheckin(${s.id})">&#9998;</button>`}
        </div>
    `).join('');
}

function updateRecentList(students) {
    const list = document.getElementById('recentList');
    if (students.length === 0) {
        list.innerHTML = '<div class="empty-state small"><div class="empty-state-desc">暂无签到记录</div></div>';
        return;
    }
    list.innerHTML = students.slice(0, 6).map(s => `
        <div class="recent-item">
            <div class="avatar" style="background:var(--success);">${s.name[0]}</div>
            <div style="flex:1;min-width:0;">
                <div style="font-size:14px;font-weight:600;color:var(--text-primary);">${s.name}</div>
                <div style="font-size:11px;color:var(--text-muted);">刚刚</div>
            </div>
            <span style="color:var(--success);font-size:16px;">&#10003;</span>
        </div>
    `).join('');
}

function detectNod(faceId, landmarks) {
    try {
        if (!landmarks || !landmarks.getNose) return false;
        const nosePoints = landmarks.getNose();
        if (!nosePoints || nosePoints.length < 4) return false;
        const noseTip = nosePoints[3];
        if (!noseTip || typeof noseTip.y !== 'number') return false;
        const y = noseTip.y;

        if (!nodState.has(faceId)) {
            nodState.set(faceId, {
                history: [], nodDetected: false, minY: Infinity, maxY: -Infinity,
                goingDown: false, goingUp: false, nodCount: 0, lastNodTime: 0
            });
        }
        const state = nodState.get(faceId);
        const now = Date.now();
        if (now - state.lastNodTime < 1500) return false;

        state.history.push(y);
        if (state.history.length > 40) state.history.shift();
        if (state.history.length < 15) return false;

        const recent = state.history.slice(-15);
        state.minY = Math.min(state.minY, ...recent);
        state.maxY = Math.max(state.maxY, ...recent);

        const a = recent.slice(0, 5).reduce((s, v) => s + v, 0) / 5;
        const b = recent.slice(5, 10).reduce((s, v) => s + v, 0) / 5;
        const c = recent.slice(10).reduce((s, v) => s + v, 0) / 5;

        if (state.maxY - state.minY > 15) {
            if (!state.goingDown && b < a - 6) state.goingDown = true;
            if (state.goingDown && !state.goingUp && c > b + 6) state.goingUp = true;
            if (state.goingDown && state.goingUp && !state.nodDetected) {
                state.nodDetected = true;
                state.lastNodTime = now;
                state.nodCount++;
                document.getElementById('nodStatus').textContent = '点头验证成功';
                setTimeout(() => {
                    const s = nodState.get(faceId);
                    if (s) {
                        s.nodDetected = false; s.history = [];
                        s.minY = Infinity; s.maxY = -Infinity;
                        s.goingDown = false; s.goingUp = false;
                    }
                    document.getElementById('nodStatus').textContent = '请点头验证';
                }, 3000);
                return true;
            }
        }

        if (state.history.length > 35) {
            state.history = state.history.slice(-15);
            state.minY = Infinity; state.maxY = -Infinity;
            state.goingDown = false; state.goingUp = false;
        }
        return false;
    } catch (error) {
        return false;
    }
}

let useBackendMode = false;
let lastNodTime = Date.now();

function stopDetection() {
    if (frameId) { cancelAnimationFrame(frameId); frameId = null; }
}

async function tryRecognizeFrameBackend() {
    const offscreen = document.createElement('canvas');
    offscreen.width = video.videoWidth || 640;
    offscreen.height = video.videoHeight || 480;
    const offCtx = offscreen.getContext('2d');
    offCtx.drawImage(video, 0, 0);
    
    const imageData = offscreen.toDataURL('image/jpeg', 0.85);
    
    try {
        const res = await fetch('/api/recognize_frame', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                class_id: currentClassId,
                course_id: currentCourseId,
                image: imageData
            })
        });
        return await res.json();
    } catch (e) {
        return { success: false };
    }
}

async function processFrame() {
    if (!currentClassId || !videoReady || !modelsLoaded || isProcessing || isSwitchingClass) {
        frameId = requestAnimationFrame(processFrame);
        return;
    }
    isProcessing = true;
    try {
        if (!ctx && !useBackendMode) { isProcessing = false; frameId = requestAnimationFrame(processFrame); return; }
        if (!video || video.readyState < 2) { isProcessing = false; frameId = requestAnimationFrame(processFrame); return; }
        
        if (useBackendMode) {
            const now = Date.now();
            if (now - lastRecognitionTime >= 2000) {
                const result = await tryRecognizeFrameBackend();
                if (result && result.success && !result.already_attended) {
                    const name = result.student_name || result.message.split(' ')[0];
                    const studentId = result.student_id;
                    if (!attendedStudents.has(studentId)) {
                        attendedStudents.add(studentId);
                        showSuccessOverlay(name);
                        document.getElementById('status').textContent = name + ' 已签到';
                        lastRecognitionTime = now;
                        await loadStudents(currentClassId);
                    }
                } else if (result && result.already_attended) {
                    document.getElementById('status').textContent = result.message;
                } else if (result && !result.success) {
                    document.getElementById('status').textContent = result.message || '等待检测...';
                }
                const fc = (result && result.face_count) ? result.face_count : 0;
                const nf = (result && result.nose_frames) ? result.nose_frames : 0;
                const lv = (result && result.liveness) ? ' ✓活体' : (nf > 0 ? ` (${nf}/6帧)` : '');
                document.getElementById('faceCount').textContent = `检测到 ${fc} 张人脸${lv}`;
            }
        } else {
            // 前端模式: 帧率限流
            const now = Date.now();
            if (now - lastFrameTime < 150) { isProcessing = false; frameId = requestAnimationFrame(processFrame); return; }
            lastFrameTime = now;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const options = new faceapi.TinyFaceDetectorOptions({ inputSize: 320, scoreThreshold: 0.4 });
            const detections = await faceapi.detectAllFaces(video, options).withFaceLandmarks().withFaceDescriptors();
            document.getElementById('faceCount').textContent = `检测到 ${detections.length} 张人脸`;

            if (detections.length > 0) {
                faceapi.draw.drawDetections(canvas, detections);
                faceapi.draw.drawFaceLandmarks(canvas, detections);
                let nodTriggered = false;
                for (let i = 0; i < detections.length; i++) {
                    const det = detections[i];
                    if (!det || !det.landmarks || !det.descriptor) continue;
                    const faceId = `face_${i}`;
                    if (detectNod(faceId, det.landmarks) || true) {
                        // 只要检测到人脸描述符就尝试匹配（点头仍作为辅助）
                        if (!faceMatcher) continue;
                        const match = faceMatcher.findBestMatch(det.descriptor);
                        if (match && match.label && match.label !== 'unknown') {
                            const studentId = parseInt(match.label);
                            const now = Date.now();
                            if (now - lastRecognitionTime < 1000) continue; // 简单节流
                            try {
                                const res = await fetch('/api/record_attendance', {
                                    method: 'POST',
                                    headers: { 'Content-Type': 'application/json' },
                                    body: JSON.stringify({ student_id: studentId, class_id: currentClassId, course_id: currentCourseId, method: 'face' })
                                });
                                const result = await res.json();
                                if (result.success) {
                                    if (!attendedStudents.has(studentId)) {
                                        attendedStudents.add(studentId);
                                        showSuccessOverlay(result.message.split(' ')[0]);
                                        document.getElementById('status').textContent = result.message;
                                        lastRecognitionTime = now;
                                        await loadStudents(currentClassId);
                                    }
                                } else {
                                    document.getElementById('status').textContent = result.message || '未匹配';
                                    showDebug('记录签到失败: ' + (result.message || '未知'), 'error');
                                }
                            } catch (err) { showDebug('记录签到 API 错误: ' + err.message, 'error'); }
                        }
                    }
                }
                // 回退机制：8秒内无点头，但检测到人脸，自动尝试识别
                if (!nodTriggered && detections[0].descriptor && Date.now() - lastNodTime > 8000 && Date.now() - lastRecognitionTime > 5000) {
                    const now = Date.now();
                    try {
                        showDebug('无点头8秒，自动尝试识别...', 'info');
                        const response = await fetch('/api/recognize_face', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ class_id: currentClassId, course_id: currentCourseId, descriptor: Array.from(detections[0].descriptor) })
                        });
                        if (!response.ok) throw new Error('HTTP ' + response.status);
                        const result = await response.json();
                        if (result.success) {
                            const name = result.message.split(' ')[0];
                            const studentId = result.student_id;
                            if (!attendedStudents.has(studentId)) {
                                attendedStudents.add(studentId);
                                showSuccessOverlay(name);
                                document.getElementById('status').textContent = name + ' 已签到';
                                lastRecognitionTime = now;
                                await loadStudents(currentClassId);
                            }
                        } else {
                            document.getElementById('status').textContent = result.message || '未匹配';
                            showDebug('自动识别失败: ' + (result.message || '未知'), 'error');
                        }
                    } catch (err) { showDebug('自动识别错误: ' + err.message, 'error'); }
                }
            }
        }
    } catch (error) { showDebug('帧错误: ' + error.message, 'error'); }
    isProcessing = false;
    frameId = requestAnimationFrame(processFrame);
}

async function manualCheckin(studentId) {
    if (!currentClassId) { alert('请先选择班级'); return; }
    try {
        const response = await fetch('/api/checkin_manual', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ student_id: studentId, class_id: currentClassId })
        });
        const result = await response.json();
        document.getElementById('status').textContent = result.success ? result.message : result.message;
        if (result.success) await loadStudents(currentClassId);
    } catch (error) { showDebug('手动签到失败: ' + error.message, 'error'); }
}

async function onClassChange(newClassId) {
    if (isSwitchingClass) return;
    isSwitchingClass = true;
    try {
        document.getElementById('status').textContent = '正在加载...';
        stopDetection();
        attendedStudents.clear();
        nodState.clear();
        lastRecognitionTime = 0;
        lastNodTime = Date.now();
        await loadStudents(newClassId);
        await loadModels();
        currentClassId = newClassId;
        fetch('/api/reset_liveness', { method: 'POST' }).catch(() => {});

        const camSection = document.getElementById('cameraSection');
        camSection.classList.add('recording');

        if (!stream) {
            if (!(navigator.mediaDevices && typeof navigator.mediaDevices.getUserMedia === 'function') && typeof navigator.getUserMedia !== 'function') {
                camSection.classList.remove('recording');
                showDebug('摄像头不可用：浏览器或当前上下文不支持 getUserMedia（请使用 HTTPS 或在本机使用 localhost）', 'error');
                document.getElementById('status').textContent = '摄像头不可用（仅 HTTPS/localhost）';
            } else {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480, facingMode: 'user' } });
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    video.play().then(() => {
                        videoReady = true;
                        document.getElementById('emptyVideoState').style.display = 'none';
                        video.style.display = 'block';
                        document.getElementById('cameraStatus').style.display = 'flex';
                        document.getElementById('detectionInfo').style.display = 'flex';
                        document.getElementById('nodIndicator').style.display = 'flex';
                        canvas.width = video.videoWidth || 640;
                        canvas.height = video.videoHeight || 480;
                        ctx = canvas.getContext('2d');
                        if (modelsLoaded) processFrame();
                    });
                };
                }
                catch (err) {
                    camSection.classList.remove('recording');
                    showDebug('摄像头失败: ' + err.message, 'error');
                    document.getElementById('status').textContent = '摄像头启动失败';
                }
            }
        } else {
            document.getElementById('emptyVideoState').style.display = 'none';
            video.style.display = 'block';
            document.getElementById('cameraStatus').style.display = 'flex';
            document.getElementById('detectionInfo').style.display = 'flex';
            document.getElementById('nodIndicator').style.display = 'flex';
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;
            ctx = canvas.getContext('2d');
            videoReady = true;
            if (modelsLoaded) processFrame();
        }
        document.getElementById('status').textContent = useBackendMode ? '正在检测人脸（后端模式）' : '正在检测人脸，请点头验证';
        document.getElementById('cameraStatusText').textContent = '正在识别';
    } catch (error) {
        showDebug('切换班级失败: ' + error.message, 'error');
        document.getElementById('status').textContent = '加载失败，请重试';
    } finally { isSwitchingClass = false; }
}

document.getElementById('classSelect').addEventListener('change', async (e) => {
    const id = e.target.value;
    const cam = document.getElementById('cameraSection');
    if (id) {
        await onClassChange(id);
    } else {
        stopDetection();
        currentClassId = null;
        videoReady = false;
        cam.classList.remove('recording');
        document.getElementById('status').textContent = '请选择班级';
        document.getElementById('emptyVideoState').style.display = 'flex';
        video.style.display = 'none';
        document.getElementById('cameraStatus').style.display = 'none';
        document.getElementById('detectionInfo').style.display = 'none';
        document.getElementById('nodIndicator').style.display = 'none';
        attendedStudents.clear();
        nodState.clear();
        document.getElementById('studentList').innerHTML = '<div class="empty-state small"><div class="empty-state-desc">选择班级查看学生</div></div>';
        document.getElementById('recentList').innerHTML = '<div class="empty-state small"><div class="empty-state-desc">暂无签到记录</div></div>';
        document.getElementById('totalCount').textContent = '0';
        document.getElementById('attendedCount').textContent = '0';
        document.getElementById('unattendedCount').textContent = '0';
        document.getElementById('panelCount').textContent = '0/0';
        document.getElementById('clearBtn').style.display = 'none';
    }
});

document.getElementById('courseSelect').addEventListener('change', (e) => {
    currentCourseId = e.target.value || null;
});

document.getElementById('clearBtn').addEventListener('click', async () => {
    if (!confirm('确定清除今日签到？')) return;
    try {
        await fetch(`/api/clear_today_attendance/${currentClassId}`, { method: 'POST' });
        document.getElementById('status').textContent = '签到已清除';
        attendedStudents.clear();
        await loadStudents(currentClassId);
    } catch (error) { showDebug('清除失败: ' + error.message, 'error'); }
});

document.getElementById('toggleDebugBtn').addEventListener('click', toggleDebug);

document.getElementById('modeToggleBtn').addEventListener('click', () => {
    useBackendMode = !useBackendMode;
    document.getElementById('modeToggleBtn').textContent = `模式: ${useBackendMode ? '后端' : '前端'}`;
    document.getElementById('nodIndicator').style.display = useBackendMode ? 'none' : 'flex';
    document.getElementById('status').textContent = useBackendMode ? '正在检测人脸（后端模式）' : '正在检测人脸，请点头验证';
    document.getElementById('nodStatus').textContent = useBackendMode ? '后端模式' : '请点头验证';
    lastRecognitionTime = 0;
    fetch('/api/reset_liveness', { method: 'POST' }).catch(() => {});
});

showDebug('页面加载完成');
</script>
{% endblock %}
