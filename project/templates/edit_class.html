{% extends "base.html" %}

{% block content %}
<h1 style="font-size: 28px; margin-bottom: 24px;">✏️ 编辑班级</h1>

<div class="card" style="max-width: 500px;">
    <form method="POST">
        <div class="form-group">
            <label>班级名称 *</label>
            <input type="text" name="name" value="{{ cls.name }}" required>
        </div>
        <div class="form-group">
            <label>描述</label>
            <textarea name="description" rows="3">{{ cls.description }}</textarea>
        </div>
        <div style="display: flex; gap: 12px;">
            <button type="submit" class="btn btn-primary">保存</button>
            <a href="/classes" class="btn btn-secondary">取消</a>
        </div>
    </form>
</div>
{% endblock %}
