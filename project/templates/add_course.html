{% extends "base.html" %}

{% block content %}
<h1 style="font-size: 28px; margin-bottom: 8px;">➕ 添加课程</h1>
<p style="color: var(--text-muted); margin-bottom: 24px;">创建一门新课程</p>

<div class="card" style="max-width: 600px;">
    {% if error %}
    <div style="background: rgba(245, 87, 108, 0.15); border: 1px solid rgba(245, 87, 108, 0.3); border-radius: 12px; padding: 14px 16px; margin-bottom: 20px; color: #f5576c; font-size: 14px;">⚠️ {{ error }}</div>
    {% endif %}
    <form method="POST" action="/courses/add">
        <div class="form-group">
            <label>课程名称 *</label>
            <input type="text" name="name" required placeholder="例如：高等数学">
        </div>
        
        <div class="form-group">
            <label>课程代码</label>
            <input type="text" name="code" placeholder="例如：MATH101">
        </div>
        
        <div class="form-group">
            <label>课程描述</label>
            <textarea name="description" rows="4" placeholder="请输入课程描述（可选）"></textarea>
        </div>
        
        <div style="display: flex; gap: 12px;">
            <button type="submit" class="btn btn-primary" style="flex: 1;">
                ✅ 创建课程
            </button>
            <a href="/courses" class="btn btn-secondary">取消</a>
        </div>
    </form>
</div>
{% endblock %}
