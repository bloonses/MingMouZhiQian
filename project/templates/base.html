<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>明眸智签 - 人脸识别考勤系统</title>
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700;800;900&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&display=swap');

        :root {
            --bg-deep: #050510;
            --bg-surface: #0a1210;
            --bg-elevated: #0d1a16;
            --brand: #00ff88;
            --brand-dim: #00cc66;
            --brand-glow: rgba(0, 255, 136, 0.4);
            --brand-glow-strong: rgba(0, 255, 136, 0.6);
            --brand-surface: rgba(0, 255, 136, 0.08);
            --text-primary: #f0f2f5;
            --text-secondary: rgba(240, 242, 245, 0.6);
            --text-muted: rgba(240, 242, 245, 0.4);
            --text-brand: #00ff88;
            --border: rgba(0, 255, 136, 0.12);
            --border-hover: rgba(0, 255, 136, 0.25);
            --border-active: rgba(0, 255, 136, 0.4);
            --danger: #ff4444;
            --danger-glow: rgba(255, 68, 68, 0.3);
            --danger-surface: rgba(255, 68, 68, 0.08);
            --warning: #ffaa00;
            --warning-glow: rgba(255, 170, 0, 0.3);
            --warning-surface: rgba(255, 170, 0, 0.08);
            --success: #00ff88;
            --ease-pulse: cubic-bezier(0.16, 1, 0.3, 1);
            --ease-cut: cubic-bezier(0.25, 1, 0.5, 1);
            --motion-fast: 120ms;
            --motion-normal: 220ms;
            --motion-slow: 360ms;
            --motion-breath: 2.4s;
        }

        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: 14px;
            line-height: 1.6;
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* ===== Animated Background ===== */
        .bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .bg-layer::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background:
                radial-gradient(ellipse 800px 600px at 15% 85%, rgba(0, 255, 136, 0.06) 0%, transparent 60%),
                radial-gradient(ellipse 600px 500px at 85% 15%, rgba(0, 255, 136, 0.04) 0%, transparent 50%),
                radial-gradient(ellipse 500px 400px at 50% 50%, rgba(0, 204, 102, 0.03) 0%, transparent 45%);
            animation: bgShift 35s ease-in-out infinite;
        }

        @keyframes bgShift {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(-2%, 1%) rotate(1deg); }
            50% { transform: translate(0, -1%) rotate(0deg); }
            75% { transform: translate(2%, 0) rotate(-1deg); }
        }

        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.2;
            pointer-events: none;
            z-index: 0;
        }

        .orb-1 {
            width: 500px;
            height: 500px;
            background: var(--brand);
            top: -150px;
            left: -150px;
            animation: orbFloat1 12s ease-in-out infinite;
        }

        .orb-2 {
            width: 350px;
            height: 350px;
            background: var(--brand-dim);
            bottom: -100px;
            right: -100px;
            animation: orbFloat2 14s ease-in-out infinite;
        }

        .orb-3 {
            width: 280px;
            height: 280px;
            background: var(--brand);
            top: 60%;
            left: 55%;
            animation: orbFloat3 16s ease-in-out infinite;
        }

        @keyframes orbFloat1 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(60px, -40px) scale(1.08); }
            66% { transform: translate(-20px, -60px) scale(0.94); }
        }

        @keyframes orbFloat2 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(-50px, -50px) scale(1.05); }
            66% { transform: translate(-30px, 30px) scale(0.96); }
        }

        @keyframes orbFloat3 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(40px, -30px) scale(1.06); }
            66% { transform: translate(-40px, 20px) scale(0.93); }
        }

        /* ===== Topbar ===== */
        .topbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 56px;
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 24px;
            z-index: 100;
        }

        .topbar .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
            margin-right: 36px;
        }

        .topbar .logo-icon {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .topbar .logo h1 {
            font-size: 18px;
            font-weight: 800;
            color: var(--text-primary);
            letter-spacing: -0.3px;
            white-space: nowrap;
        }

        .topbar .nav-tabs {
            display: flex;
            align-items: center;
            gap: 4px;
            flex: 1;
            height: 100%;
        }

        .topbar .nav-tabs a {
            display: flex;
            align-items: center;
            height: 100%;
            padding: 0 16px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            position: relative;
            transition: color var(--motion-normal) var(--ease-cut);
            white-space: nowrap;
        }

        .topbar .nav-tabs a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 2px;
            background: var(--brand);
            box-shadow: 0 0 8px var(--brand-glow);
            transition: width var(--motion-normal) var(--ease-cut);
        }

        .topbar .nav-tabs a:hover {
            color: var(--text-primary);
        }

        .topbar .nav-tabs a:hover::after {
            width: 60%;
        }

        .topbar .nav-tabs a.active {
            color: var(--text-brand);
        }

        .topbar .nav-tabs a.active::after {
            width: 80%;
        }

        .topbar .nav-right {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-shrink: 0;
            margin-left: auto;
        }

        .topbar .nav-right .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .topbar .nav-right .status-dot.online {
            background: var(--brand);
            box-shadow: 0 0 8px var(--brand-glow);
            animation: neonBreath var(--motion-breath) ease-in-out infinite;
        }

        .topbar .nav-right .status-dot.offline {
            background: var(--text-muted);
        }

        .topbar .nav-right .status-dot.warning {
            background: var(--warning);
            box-shadow: 0 0 8px var(--warning-glow);
        }

        @keyframes neonBreath {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .topbar .nav-right .user-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
        }

        .topbar .nav-right .logout-link {
            color: var(--danger);
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            font-family: 'JetBrains Mono', monospace;
            transition: color var(--motion-fast) var(--ease-cut);
            padding: 6px 12px;
            border: 1px solid rgba(255, 68, 68, 0.15);
            background: var(--danger-surface);
        }

        .topbar .nav-right .logout-link:hover {
            background: rgba(255, 68, 68, 0.15);
            border-color: rgba(255, 68, 68, 0.3);
        }

        .topbar .nav-right .login-links {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 13px;
            font-family: 'JetBrains Mono', monospace;
        }

        .topbar .nav-right .login-links a {
            color: var(--text-secondary);
            text-decoration: none;
            transition: color var(--motion-fast) var(--ease-cut);
        }

        .topbar .nav-right .login-links a:hover {
            color: var(--text-brand);
        }

        .topbar .nav-right .login-links span {
            color: var(--text-muted);
        }

        /* ===== Content Area ===== */
        .content {
            margin-top: 56px;
            padding: 36px 44px;
            min-height: calc(100vh - 56px);
            position: relative;
            z-index: 1;
        }

        .content-fade-in {
            animation: contentReveal 0.5s var(--ease-cut) both;
        }

        @keyframes contentReveal {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== Page Header ===== */
        .page-header {
            margin-bottom: 32px;
        }

        .page-header h1 {
            font-size: 28px;
            font-weight: 800;
            color: var(--text-primary);
            letter-spacing: -0.5px;
            position: relative;
            display: inline-block;
        }

        .page-header h1::after {
            content: '';
            display: block;
            width: 100%;
            height: 3px;
            background: var(--brand);
            box-shadow: 0 0 12px var(--brand-glow);
            margin-top: 8px;
        }

        /* ===== Cards ===== */
        .card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            padding: 32px;
            margin-bottom: 24px;
            position: relative;
            z-index: 2;
            transition: border-color var(--motion-slow) var(--ease-cut);
        }

        .card:hover {
            border-color: var(--border-hover);
        }

        .card h2 {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* ===== Stat Cards ===== */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 28px;
        }

        .stat-card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            padding: 20px;
            position: relative;
            overflow: hidden;
            transition: all var(--motion-normal) var(--ease-cut);
            cursor: default;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 20%;
            right: 20%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--brand), transparent);
            opacity: 0.4;
            transition: opacity var(--motion-normal) var(--ease-cut);
        }

        .stat-card:hover {
            transform: translateY(-2px);
            border-color: var(--border-hover);
            box-shadow: 0 0 24px var(--brand-glow);
        }

        .stat-card:hover::before {
            opacity: 1;
        }

        .stat-card .value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 32px;
            font-weight: 800;
            color: var(--brand);
            text-shadow: 0 0 20px var(--brand-glow);
            line-height: 1;
            margin-bottom: 8px;
        }

        .stat-card .label {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 500;
        }

        /* ===== Buttons ===== */
        .btn {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.5px;
            padding: 12px 28px;
            cursor: pointer;
            transition: all var(--motion-fast) var(--ease-cut);
            position: relative;
            overflow: hidden;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .btn:active {
            transform: scale(0.97);
            transition: transform 80ms var(--ease-cut);
        }

        .btn-primary {
            background: var(--brand);
            color: var(--bg-deep);
            border: none;
            box-shadow: 0 0 16px var(--brand-glow);
        }

        .btn-primary:hover {
            box-shadow: 0 0 28px var(--brand-glow-strong);
            transform: translateY(-1px);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid rgba(0, 255, 136, 0.2);
            color: var(--text-brand);
        }

        .btn-outline:hover {
            border-color: var(--border-hover);
            transform: translateY(-1px);
        }

        .btn-danger {
            background: var(--danger-surface);
            border: 1px solid rgba(255, 68, 68, 0.3);
            color: var(--danger);
        }

        .btn-danger:hover {
            background: rgba(255, 68, 68, 0.15);
            box-shadow: 0 0 16px var(--danger-glow);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: var(--text-secondary);
        }

        .btn-secondary:hover {
            border-color: var(--border-hover);
            color: var(--text-primary);
            transform: translateY(-1px);
        }

        /* ===== Form Elements ===== */
        .form-group {
            margin-bottom: 22px;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 13px;
            color: var(--text-secondary);
            letter-spacing: 0.3px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea,
        select,
        input[type="date"] {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-deep);
            border: 1px solid var(--border);
            font-size: 14px;
            color: var(--text-primary);
            transition: all var(--motion-fast) var(--ease-cut);
            font-family: inherit;
        }

        .form-group input::placeholder,
        .form-group select::placeholder,
        .form-group textarea::placeholder,
        input[type="date"]::placeholder {
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-muted);
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus,
        select:focus,
        input[type="date"]:focus {
            outline: none;
            border-color: var(--border-active);
            box-shadow: 0 0 0 3px rgba(0, 255, 136, 0.08);
        }

        select {
            cursor: pointer;
            background-image: linear-gradient(45deg, transparent 50%, var(--text-muted) 50%),
                              linear-gradient(135deg, var(--text-muted) 50%, transparent 50%);
            background-position: calc(100% - 18px) calc(1em + 14px),
                                 calc(100% - 13px) calc(1em + 14px);
            background-size: 5px 5px,
                             5px 5px;
            background-repeat: no-repeat;
            padding-right: 40px;
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
        }

        select option {
            background: var(--bg-deep);
            color: var(--text-primary);
            padding: 12px;
        }

        /* ===== Tables ===== */
        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            background: var(--bg-surface);
            border: 1px solid var(--border);
        }

        table thead {
            border-bottom: 2px solid var(--border);
        }

        table th {
            padding: 10px 14px;
            text-align: left;
            font-weight: 600;
            color: var(--text-muted);
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: uppercase;
            border-bottom: 2px solid var(--border);
        }

        table td {
            padding: 16px 14px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        table tbody tr:nth-child(even) {
            background: rgba(0, 255, 136, 0.02);
        }

        table tbody tr:hover {
            background: rgba(0, 255, 136, 0.05);
        }

        /* ===== Badges ===== */
        .badge {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            font-weight: 600;
            padding: 4px 10px;
            display: inline-block;
        }

        .badge-success {
            color: var(--brand);
            background: var(--brand-surface);
            border: 1px solid rgba(0, 255, 136, 0.15);
        }

        .badge-warning {
            color: var(--warning);
            background: var(--warning-surface);
            border: 1px solid rgba(255, 170, 0, 0.15);
        }

        .badge-danger {
            color: var(--danger);
            background: var(--danger-surface);
            border: 1px solid rgba(255, 68, 68, 0.15);
        }

        .badge-info {
            color: var(--text-primary);
            background: rgba(240, 242, 245, 0.06);
            border: 1px solid rgba(240, 242, 245, 0.1);
        }

        /* ===== Status Dot ===== */
        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
        }

        .status-dot.online {
            background: var(--brand);
            box-shadow: 0 0 8px var(--brand-glow);
            animation: neonBreath var(--motion-breath) ease-in-out infinite;
        }

        .status-dot.offline {
            background: var(--text-muted);
        }

        .status-dot.warning {
            background: var(--warning);
            box-shadow: 0 0 8px var(--warning-glow);
        }

        /* ===== Success Overlay ===== */
        .success-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(5, 5, 16, 0.85);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all var(--motion-slow) var(--ease-cut);
            pointer-events: none;
        }

        .success-overlay.show {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }

        .success-overlay .success-popup {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            padding: 56px 72px;
            text-align: center;
            position: relative;
        }

        .success-overlay .success-popup .check-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            border: 2px solid var(--brand);
            box-shadow: 0 0 24px var(--brand-glow), inset 0 0 24px rgba(0, 255, 136, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: var(--brand);
        }

        .success-overlay .success-popup h2 {
            font-size: 28px;
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: 6px;
        }

        .success-overlay .success-popup p {
            color: var(--text-secondary);
            font-size: 16px;
        }

        /* ===== Recent List ===== */
        .recent-list {
            max-height: 240px;
            overflow-y: auto;
            margin-bottom: 16px;
        }

        .recent-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px;
            border-bottom: 1px solid var(--border);
            transition: background var(--motion-fast) ease;
        }

        .recent-item:hover {
            background: rgba(0, 255, 136, 0.03);
        }

        .avatar {
            width: 40px;
            height: 40px;
            background: var(--brand);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--bg-deep);
            font-weight: 700;
            font-size: 16px;
            flex-shrink: 0;
            font-family: 'JetBrains Mono', monospace;
        }

        /* ===== Debug Panel ===== */
        .debug-panel {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border);
            padding: 16px;
            max-height: 280px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* ===== Dropdown ===== */
        .dropdown {
            position: relative;
            display: inline-block;
        }

        .dropdown-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 22px;
            cursor: pointer;
            padding: 6px 10px;
            transition: all var(--motion-fast) ease;
            font-family: inherit;
        }

        .dropdown-btn:hover {
            background: rgba(0, 255, 136, 0.06);
            color: var(--text-primary);
        }

        .dropdown-content {
            display: none;
            position: absolute;
            right: 0;
            top: 100%;
            min-width: 160px;
            background: var(--bg-surface);
            border: 1px solid var(--border);
            margin-top: 6px;
            padding: 6px 0;
            z-index: 1000;
            transform-origin: top right;
        }

        .dropdown-content.show {
            display: block;
        }

        .dropdown-content a {
            display: block;
            padding: 10px 18px;
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 13px;
            transition: all var(--motion-fast) ease;
            cursor: pointer;
        }

        .dropdown-content a:hover {
            background: var(--brand-surface);
            color: var(--text-primary);
        }

        /* ===== Scrollbar ===== */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-hover);
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 255, 136, 0.35);
        }

        /* ===== Utility ===== */
        .text-brand { color: var(--text-brand); }
        .text-success { color: var(--brand); }
        .text-danger { color: var(--danger); }
        .text-center { text-align: center; }
        .mt-24 { margin-top: 24px; }
        .mb-24 { margin-bottom: 24px; }
        .gap-16 { gap: 16px; }
        .flex-between {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        /* ===== Responsive ===== */
        @media (max-width: 768px) {
            .topbar {
                flex-wrap: wrap;
                height: auto;
                padding: 12px 16px;
            }

            .topbar .logo {
                margin-right: 0;
                margin-bottom: 8px;
                width: 100%;
            }

            .topbar .nav-tabs {
                flex-wrap: nowrap;
                overflow-x: auto;
                overflow-y: hidden;
                width: 100%;
                height: 40px;
                -webkit-overflow-scrolling: touch;
            }

            .topbar .nav-tabs a {
                flex-shrink: 0;
                height: 40px;
                padding: 0 12px;
                font-size: 12px;
            }

            .topbar .nav-right {
                margin-left: 0;
                width: 100%;
                justify-content: flex-end;
                padding-top: 8px;
            }

            .content {
                margin-top: 0;
                padding: 16px 16px 16px;
            }

            .content:has(~ .topbar) {
                margin-top: 120px;
            }

            .stats {
                grid-template-columns: 1fr;
            }
        }

        /* ===== Reduced Motion ===== */
        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }

            .bg-layer::before { animation: none; }
            .orb { animation: none; }
        }
    </style>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            document.querySelector('.content')?.classList.add('content-fade-in');
        });
    </script>
</head>
<body>
    <div class="bg-layer"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <header class="topbar">
        <div class="logo">
            <div class="logo-icon">
                <svg width="36" height="36" viewBox="0 0 96 96">
                    <defs>
                        <linearGradient id="iris-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#00ff88"/>
                            <stop offset="100%" style="stop-color:#00cc66"/>
                        </linearGradient>
                    </defs>
                    <ellipse cx="48" cy="48" rx="30" ry="38" fill="url(#iris-grad)" opacity="0.12"/>
                    <ellipse cx="48" cy="48" rx="30" ry="38" fill="none" stroke="url(#iris-grad)" stroke-width="3.5" stroke-linecap="round"/>
                    <circle cx="48" cy="46" r="16" fill="url(#iris-grad)" opacity="0.25"/>
                    <circle cx="48" cy="46" r="9" fill="url(#iris-grad)"/>
                    <circle cx="42" cy="42" r="3.5" fill="#050510" opacity="0.9"/>
                    <path d="M18 26 Q48 8 78 26" fill="none" stroke="url(#iris-grad)" stroke-width="2.8" stroke-linecap="round" opacity="0.5"/>
                    <path d="M18 70 Q48 88 78 70" fill="none" stroke="url(#iris-grad)" stroke-width="2.8" stroke-linecap="round" opacity="0.5"/>
                </svg>
            </div>
            <h1>明眸智签</h1>
        </div>

        <nav class="nav-tabs">
            <a href="/" class="{{ 'active' if request.path == '/' else '' }}">仪表板</a>
            <a href="/attendance" class="{{ 'active' if request.path == '/attendance' else '' }}">人脸签到</a>
            <a href="/students" class="{{ 'active' if request.path == '/students' else '' }}">学生</a>
            <a href="/classes" class="{{ 'active' if request.path == '/classes' else '' }}">班级</a>
            <a href="/courses" class="{{ 'active' if request.path.startswith('/courses') else '' }}">课程</a>
            <a href="/records" class="{{ 'active' if request.path == '/records' else '' }}">记录</a>
            <a href="/qrcode_attendance" class="{{ 'active' if request.path == '/qrcode_attendance' else '' }}">二维码</a>
            <a href="/statistics" class="{{ 'active' if request.path == '/statistics' else '' }}">统计</a>
        </nav>

        <div class="nav-right">
            {% if user %}
            <span class="status-dot online"></span>
            <span class="user-name">{{ user.name }}</span>
            <a href="/logout" class="logout-link">退出</a>
            {% else %}
            <div class="login-links">
                <a href="/login">登录</a>
                <span>|</span>
                <a href="/register">注册</a>
            </div>
            {% endif %}
        </div>
    </header>

    <main class="content">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
