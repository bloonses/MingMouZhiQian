<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>明眸智签 - 管理员注册</title>
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-deep: #050510;
            --bg-surface: #0a1210;
            --brand: #00ff88;
            --brand-glow: rgba(0, 255, 136, 0.4);
            --brand-glow-strong: rgba(0, 255, 136, 0.6);
            --text-primary: #f0f2f5;
            --text-secondary: rgba(240, 242, 245, 0.6);
            --text-muted: rgba(240, 242, 245, 0.4);
            --border: rgba(0, 255, 136, 0.12);
            --border-active: rgba(0, 255, 136, 0.4);
            --danger: #ff4444;
            --warning: #ffaa00;
        }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: 14px;
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            -webkit-font-smoothing: antialiased;
        }

        .bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 200%;
            height: 200%;
            z-index: -2;
            pointer-events: none;
            background:
                radial-gradient(ellipse 600px 500px at 25% 75%, rgba(0, 255, 136, 0.06) 0%, transparent 60%),
                radial-gradient(ellipse 500px 400px at 75% 25%, rgba(0, 255, 136, 0.04) 0%, transparent 50%),
                radial-gradient(ellipse 300px 300px at 50% 50%, rgba(0, 255, 136, 0.03) 0%, transparent 50%);
            animation: bgShift 30s ease-in-out infinite;
        }

        @keyframes bgShift {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(2%, -1%) rotate(1deg); }
            66% { transform: translate(-1%, 1%) rotate(-1deg); }
        }

        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.2;
            pointer-events: none;
            z-index: -1;
        }

        .orb-1 {
            width: 420px;
            height: 420px;
            background: var(--brand);
            top: -120px;
            left: -80px;
            animation: orbFloat1 12s ease-in-out infinite;
        }

        .orb-2 {
            width: 300px;
            height: 300px;
            background: var(--brand);
            bottom: -80px;
            right: -80px;
            animation: orbFloat2 14s ease-in-out infinite;
        }

        @keyframes orbFloat1 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(40px, -30px) scale(1.06); }
            66% { transform: translate(-20px, -40px) scale(0.95); }
        }

        @keyframes orbFloat2 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(-30px, -40px) scale(1.04); }
            66% { transform: translate(-20px, 20px) scale(0.97); }
        }

        .register-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 440px;
            padding: 20px;
        }

        .register-card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            padding: 44px 36px;
            animation: cardReveal 0.5s ease both;
        }

        @keyframes cardReveal {
            from {
                opacity: 0;
                transform: translateY(16px) scale(0.97);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .logo-section {
            text-align: center;
            margin-bottom: 36px;
        }

        .logo {
            width: 56px;
            height: 56px;
            margin: 0 auto 16px;
            background: var(--brand);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 32px var(--brand-glow);
            animation: logoGlow 3s ease-in-out infinite;
        }

        @keyframes logoGlow {
            0%, 100% { box-shadow: 0 0 32px var(--brand-glow); }
            50% { box-shadow: 0 0 48px var(--brand-glow-strong); }
        }

        .title {
            font-size: 22px;
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .subtitle {
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 400;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 10px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px;
            background: var(--bg-deep);
            border: 1px solid var(--border);
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .form-input:focus {
            border-color: var(--border-active);
            box-shadow: 0 0 0 3px rgba(0, 255, 136, 0.08);
        }

        .form-input::placeholder {
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-muted);
        }

        .form-input:-webkit-autofill {
            -webkit-box-shadow: 0 0 0 30px var(--bg-deep) inset;
            -webkit-text-fill-color: var(--text-primary);
        }

        .password-wrapper {
            position: relative;
        }

        .password-wrapper .form-input {
            padding-right: 48px;
        }

        .password-toggle {
            position: absolute;
            right: 0;
            top: 0;
            height: 100%;
            width: 44px;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-family: 'JetBrains Mono', monospace;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s ease;
        }

        .password-toggle:hover {
            color: var(--text-secondary);
        }

        .password-strength {
            margin-top: 10px;
        }

        .strength-bar {
            display: flex;
            gap: 4px;
            height: 3px;
        }

        .strength-segment {
            flex: 1;
            background: rgba(240, 242, 245, 0.08);
            transition: background 0.3s ease;
        }

        .strength-segment.weak {
            background: var(--danger);
        }

        .strength-segment.medium {
            background: var(--warning);
        }

        .strength-segment.strong {
            background: var(--brand);
        }

        .strength-text {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 8px;
        }

        .error-message {
            background: rgba(255, 68, 68, 0.1);
            border: 1px solid rgba(255, 68, 68, 0.25);
            padding: 12px 16px;
            margin-bottom: 20px;
            animation: errorShake 0.35s ease;
        }

        .error-message span {
            color: var(--danger);
            font-size: 12px;
        }

        @keyframes errorShake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-4px); }
            40% { transform: translateX(4px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(2px); }
        }

        .success-message {
            background: rgba(0, 255, 136, 0.08);
            border: 1px solid rgba(0, 255, 136, 0.25);
            padding: 12px 16px;
            margin-bottom: 20px;
        }

        .success-message span {
            color: var(--brand);
            font-size: 12px;
        }

        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            transition: box-shadow 0.2s ease, transform 0.2s ease;
            user-select: none;
        }

        .btn-primary {
            background: var(--brand);
            color: #050510;
            box-shadow: 0 0 20px var(--brand-glow);
            margin-bottom: 20px;
        }

        .btn-primary:hover {
            box-shadow: 0 0 28px var(--brand-glow-strong);
            transform: translateY(-1px);
        }

        .btn-primary:active {
            transform: scale(0.97);
            transition: transform 0.08s ease;
        }

        .btn-secondary {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid rgba(240, 242, 245, 0.06);
            margin-bottom: 0;
        }

        .btn-secondary:hover {
            color: var(--brand);
            border-color: var(--border-active);
            box-shadow: 0 0 24px rgba(0, 255, 136, 0.1);
            transform: translateY(-1px);
        }

        .btn-secondary:active {
            transform: scale(0.97);
            transition: transform 0.08s ease;
        }

        .links-section {
            text-align: center;
            margin-top: 20px;
        }

        .link {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .link:hover {
            color: var(--brand);
        }

        .footer {
            text-align: center;
            margin-top: 24px;
        }

        .footer p {
            font-size: 13px;
            color: var(--text-muted);
        }

        .footer a {
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .footer a:hover {
            color: var(--brand);
        }

        @media (max-width: 480px) {
            .register-card {
                padding: 36px 24px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <div class="bg-layer"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="register-container">
        <div class="register-card">
            <div class="logo-section">
                <div class="logo">
                    <svg width="44" height="44" viewBox="0 0 96 96">
                        <ellipse cx="48" cy="48" rx="30" ry="38" fill="rgba(5,5,16,0.6)"/>
                        <ellipse cx="48" cy="48" rx="30" ry="38" fill="none" stroke="#050510" stroke-width="3.5" stroke-linecap="round"/>
                        <circle cx="48" cy="46" r="16" fill="rgba(5,5,16,0.4)"/>
                        <circle cx="48" cy="46" r="9" fill="#050510"/>
                        <circle cx="42" cy="42" r="3.5" fill="#00ff88" opacity="0.9"/>
                        <path d="M18 26 Q48 8 78 26" fill="none" stroke="#050510" stroke-width="2.8" stroke-linecap="round" opacity="0.7"/>
                        <path d="M18 70 Q48 88 78 70" fill="none" stroke="#050510" stroke-width="2.8" stroke-linecap="round" opacity="0.7"/>
                    </svg>
                </div>
                <h1 class="title">明眸智签</h1>
                <p class="subtitle">REGISTER</p>
            </div>

            {% if error %}
            <div class="error-message">
                <span>{{ error }}</span>
            </div>
            {% endif %}

            {% if success %}
            <div class="success-message">
                <span>{{ success }}</span>
            </div>
            {% endif %}

            <form method="POST" action="/register">
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <input type="text" class="form-input" name="username" placeholder="username" required autofocus>
                </div>

                <div class="form-group">
                    <label class="form-label">Name</label>
                    <input type="text" class="form-input" name="name" placeholder="name" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <div class="password-wrapper">
                        <input type="password" class="form-input" name="password" id="password" placeholder="password" required>
                        <button type="button" class="password-toggle" onclick="togglePassword('password')" title="显示密码">&#128065;</button>
                    </div>
                    <div class="password-strength">
                        <div class="strength-bar">
                            <div class="strength-segment" id="s1"></div>
                            <div class="strength-segment" id="s2"></div>
                            <div class="strength-segment" id="s3"></div>
                            <div class="strength-segment" id="s4"></div>
                        </div>
                        <div class="strength-text" id="strengthText">type password</div>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Confirm Password</label>
                    <div class="password-wrapper">
                        <input type="password" class="form-input" name="confirm_password" id="confirm_password" placeholder="confirm password" required>
                        <button type="button" class="password-toggle" onclick="togglePassword('confirm_password')" title="显示密码">&#128065;</button>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">安全问题</label>
                    <select class="form-input" name="security_question" required style="font-family:'Noto Sans SC','JetBrains Mono',monospace;font-size:13px;appearance:auto;">
                        <option value="">请选择安全问题</option>
                        <option value="你的小学名称是什么？">你的小学名称是什么？</option>
                        <option value="你的母亲的名字是什么？">你的母亲的名字是什么？</option>
                        <option value="你的父亲的名字是什么？">你的父亲的名字是什么？</option>
                        <option value="你最喜欢的宠物名字是什么？">你最喜欢的宠物名字是什么？</option>
                        <option value="你出生的城市是哪里？">你出生的城市是哪里？</option>
                        <option value="你最喜欢的颜色是什么？">你最喜欢的颜色是什么？</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">安全答案</label>
                    <input type="text" class="form-input" name="security_answer" placeholder="安全答案" required>
                </div>

                <button type="submit" class="btn btn-primary">注册</button>
            </form>

            <div class="links-section">
                <a href="/login" class="link">返回登录</a>
            </div>
        </div>

        <div class="footer">
            <p>&copy; 2026 明眸智签 &middot; 人脸识别考勤系统</p>
            <p><a href="/">返回首页</a></p>
        </div>
    </div>

    <script>
        function togglePassword(fieldId) {
            var p = document.getElementById(fieldId);
            var btn = p.parentNode.querySelector('.password-toggle');
            p.type = p.type === 'password' ? 'text' : 'password';
        }

        function checkPasswordStrength() {
            var password = document.getElementById('password').value;
            var strength = 0;

            if (password.length >= 6) strength++;
            if (password.length >= 8) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[a-z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^A-Za-z0-9]/.test(password)) strength++;

            var segments = document.querySelectorAll('.strength-segment');
            var strengthText = document.getElementById('strengthText');

            segments.forEach(function(seg, index) {
                seg.classList.remove('weak', 'medium', 'strong');
                if (index < strength) {
                    if (strength <= 2) seg.classList.add('weak');
                    else if (strength <= 4) seg.classList.add('medium');
                    else seg.classList.add('strong');
                }
            });

            if (password.length === 0) {
                strengthText.textContent = 'type password';
                strengthText.style.color = 'rgba(240, 242, 245, 0.4)';
            } else if (strength <= 2) {
                strengthText.textContent = 'weak';
                strengthText.style.color = '#ff4444';
            } else if (strength <= 4) {
                strengthText.textContent = 'medium';
                strengthText.style.color = '#ffaa00';
            } else {
                strengthText.textContent = 'strong';
                strengthText.style.color = '#00ff88';
            }
        }

        document.getElementById('password').addEventListener('input', checkPasswordStrength);
    </script>
</body>
</html>
